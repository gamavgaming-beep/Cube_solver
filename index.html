<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rubik Solver Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="app">

<header class="topbar">

<div class="logo">

🧩 Rubik Solver Pro

</div>

<button id="themeBtn">

🌙

</button>

</header>

<main>

<section id="wizard">

<div class="wizard-header">

<h2>

Customize Your Cube

</h2>

<p id="stepTitle">

Step 1 / 6 • Top (U)

</p>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<div class="cube-preview">

<div id="faceEditor"></div>

</div>

<div class="color-picker">

<button class="color white" data-color="white"></button>

<button class="color yellow" data-color="yellow"></button>

<button class="color red" data-color="red"></button>

<button class="color orange" data-color="orange"></button>

<button class="color blue" data-color="blue"></button>

<button class="color green" data-color="green"></button>

</div>

<div class="wizard-buttons">

<button id="prevBtn">

⬅ Previous

</button>

<button id="nextBtn">

Next ➜

</button>

</div>

</section>
