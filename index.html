<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Rubik's Cube Solver Pro</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="background"></div>

<header>

    <div class="logo">

        🧩 Rubik Solver Pro

    </div>

    <nav>

        <button id="themeBtn">
            🌙
        </button>

    </nav>

</header>

<main>

<section class="leftPanel">

<h2>

3×3 Cube Editor

</h2>

<div class="cubeContainer">

<div id="cubeEditor">

    <div class="cube-face" id="face-U"></div>

    <div class="cube-face" id="face-R"></div>

    <div class="cube-face" id="face-F"></div>

    <div class="cube-face" id="face-D"></div>

    <div class="cube-face" id="face-L"></div>

    <div class="cube-face" id="face-B"></div>

</div>

</div>

<div class="colorPicker">

<button class="color white"
        data-color="white"></button>

<button class="color yellow"
        data-color="yellow"></button>

<button class="color red"
        data-color="red"></button>

<button class="color orange"
        data-color="orange"></button>

<button class="color blue"
        data-color="blue"></button>

<button class="color green"
        data-color="green"></button>

</div>

</section>

<section class="rightPanel">

<div class="card">

<h3>

Cube Controls

</h3>

<button id="validateBtn">

Validate Cube

</button>

<button id="solveBtn">

Solve Cube

</button>

<button id="resetBtn">

Reset

</button>

<button id="scrambleBtn">

Random Scramble

</button>

</div>

<div class="card">

<h3>

Solution

</h3>

<div id="solutionOutput">

Waiting...

</div>

</div>

<div class="card">

<h3>

Statistics

</h3>

<p>

Moves :
<span id="moveCount">

0

</span>

</p>

<p>

Time :
<span id="timer">

00:00

</span>

</p>

</div>

</section>

</main>

<footer>

Rubik Solver Pro © 2026

</footer>

<script src="cube.js"></script>
<script src="validator.js"></script>
<script src="solver.js"></script>
<script src="script.js"></script>
<script src="animation.js"></script>
<script src="app.js"></script>

</body>
</html>
