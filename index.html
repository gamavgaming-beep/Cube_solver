<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rubik Solver Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="app">

<header class="topbar">

<div class="logo">

🧩 Rubik Solver Pro

</div>

<button id="themeBtn">

🌙

</button>

</header>

<main>

<section id="wizard">

<div class="wizard-header">

<h2>

Customize Your Cube

</h2>

<p id="stepTitle">

Step 1 / 6 • Top (U)

</p>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<div class="cube-preview">

<div id="faceEditor"></div>

</div>

<div class="color-picker">

<button class="color white" data-color="white"></button>

<button class="color yellow" data-color="yellow"></button>

<button class="color red" data-color="red"></button>

<button class="color orange" data-color="orange"></button>

<button class="color blue" data-color="blue"></button>

<button class="color green" data-color="green"></button>

</div>

<div class="wizard-buttons">

<button id="prevBtn">

⬅ Previous

</button>

<button id="nextBtn">

Next ➜

</button>

</div>

</section>

<section id="solveScreen" class="hidden">

<div class="solve-card">

<h2>

Solution

</h2>

<p id="moveInfo">

Move 0 / 0

</p>

<h1 id="currentMove">

-

</h1>

<div id="viewer">

<div id="viewerCube">

</div>

</div>

<div class="viewer-buttons">

<button id="movePrev">

⬅ Previous Move

</button>

<button id="moveNext">

Next Move ➜

</button>

</div>

</div>

<div class="stats-card">

<h3>

Statistics

</h3>

<p>

Moves :
<span id="moveCount">

0

</span>

</p>

<p>

Current Step :
<span id="currentStep">

0

</span>

</p>

<p>

Status :
<span id="solveStatus">

Waiting...

</span>

</p>

</div>

</section>

</main>

<footer>

Rubik Solver Pro © 2026

</footer>
<script src="cube.js"></script>
<script src="color-picker.js"></script>
<script src="wizard.js"></script>
<script src="validator.js"></script>
<script src="solver.js"></script>
<script src="viewer.js"></script>
<script src="moves.js"></script>
<script src="player.js"></script>
<script src="app.js"></script>

</div>

</body>
</html>
