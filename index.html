<!DOCTYPE html>
<html>
<head>
    <title>Rubik's Cube Solver</title>
    <!-- Kociemba.js லைப்ரரியை இணையத்திலிருந்து இணைக்கிறோம் -->
    <script src="https://cdn.jsdelivr.net/npm/kociemba@1.0.0/dist/kociemba.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; }
        .grid { display: inline-grid; grid-template-columns: repeat(3, 50px); gap: 5px; margin-bottom: 20px; }
        .cell { width: 50px; height: 50px; border: 1px solid #000; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Rubik's Cube Solver</h1>
    <p>கியூப் நிறங்களை உள்ளிட்டு Solve பட்டனை அழுத்தவும்.</p>
    
    <div class="grid" id="cubeGrid"></div>
    <button onclick="solveMyCube()">Solve Cube</button>
    <h2 id="solution"></h2>

    <script>
        // 1. 9 கட்டங்களை உருவாக்குதல்
        const grid = document.getElementById('cubeGrid');
        for (let i = 0; i < 9; i++) {
            let div = document.createElement('div');
            div.className = 'cell';
            div.style.backgroundColor = 'white';
            div.onclick = function() { 
                this.style.backgroundColor = (this.style.backgroundColor === 'white') ? 'red' : 'white'; 
            };
            grid.appendChild(div);
        }

        // 2. சால்வ் செய்யும் பங்க்ஷன்
        function solveMyCube() {
            // கியூப் நிலையை Kociemba-விற்கு புரியும் வகையில் மாற்றுதல்
            // இது ஒரு உதாரணம் மட்டுமே, முழு கியூபிற்கும் 54 கட்டங்கள் தேவை
            const cubeString = "UUUUUUUUURRRRRRRRRFFFFFFFFFDDDDDDDDDLLLLLLLLLBBBBBBBBB";
            
            try {
                // Kociemba.solve() பங்க்ஷனை அழைத்தல்
                const solution = kociemba.solve(cubeString);
                document.getElementById("solution").innerText = "தீர்வு: " + solution;
            } catch (e) {
                document.getElementById("solution").innerText = "தவறான உள்ளீடு, மீண்டும் முயலவும்!";
            }
        }
    </script>
</body>
</html>
